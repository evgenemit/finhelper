services:
  backend:
    image: finhelper_backend
    build: ./finhelper_backend
    restart: unless-stopped
    depends_on:
      backend_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      BACK_DB_HOST: backend_db
      BACK_DB_PORT: 5432
      BACK_DB_USER: ${BACK_DB_USER}
      BACK_DB_PASS: ${BACK_DB_PASS}
      BACK_DB_NAME: ${BACK_DB_NAME}
      REDIS_HOST: redis
      DEEPSEEK_KEY: ${DEEPSEEK_KEY}
  backend_db:
    image: postgres:16.0
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${BACK_DB_PASS}
      POSTGRES_USER: ${BACK_DB_USER}
      POSTGRES_DB: ${BACK_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-backend-data:/var/lib/postgresql/data
  redis:
    image: redis:8
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  bot:
    image: finhelper_bot
    build: ./finhelper_bot
    restart: unless-stopped
    depends_on:
      bot_db:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BOT_DB_HOST: bot_db
      BOT_DB_PORT: 5432
      BOT_DB_USER: ${BOT_DB_USER}
      BOT_DB_PASS: ${BOT_DB_PASS}
      BOT_DB_NAME: ${BOT_DB_NAME}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      BACKEND_URL: http://backend:8000
  bot_db:
    image: postgres:16.0
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${BOT_DB_PASS}
      POSTGRES_USER: ${BOT_DB_USER}
      POSTGRES_DB: ${BOT_DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-bot-data:/var/lib/postgresql/data


volumes:
  db-backend-data:
  db-bot-data:
  redis-data:
